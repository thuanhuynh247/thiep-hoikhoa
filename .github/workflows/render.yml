name: Render thiệp video Hội Khóa

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cài thư viện
        run: npm install

      - name: Cài Chromium cho Playwright
        run: npx playwright install --with-deps chromium

      - name: Cài ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg zip

      - name: Render toàn bộ video
        run: node render.mjs danhsach.csv

      - name: Đóng gói video
        uses: actions/upload-artifact@v4
        with:
          name: thiep-video-theo-lop
          path: output/*.zip
          retention-days: 14
